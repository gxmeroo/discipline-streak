<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Discipline Streak</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#0f1117;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.card{
    background:#1a1d26;
    padding:40px;
    border-radius:20px;
    text-align:center;
    width:250px;
    box-shadow:0 10px 30px rgba(0,0,0,0.5);
}

.streak{
    font-size:60px;
    font-weight:bold;
}

.label{
    color:#aaa;
    margin-bottom:20px;
}

button{
    border:none;
    padding:10px 18px;
    margin:5px;
    border-radius:10px;
    font-size:16px;
    cursor:pointer;
}

.add{
    background:#2ecc71;
    color:white;
}

.reset{
    background:#e74c3c;
    color:white;
}
</style>
</head>

<body>

<div class="card">

<div style="font-size:22px;">🔥 Discipline Streak</div>

<div class="streak" id="counter">0</div>
<div class="label">days</div>

<button class="add" onclick="add()">+1</button>
<button class="reset" onclick="reset()">Reset</button>

</div>

<script>

let streak = localStorage.getItem("streak") || 0;

document.getElementById("counter").innerText = streak;

function add(){
    streak++;
    localStorage.setItem("streak", streak);
    document.getElementById("counter").innerText = streak;
}

function reset(){
    streak = 0;
    localStorage.setItem("streak", streak);
    document.getElementById("counter").innerText = streak;
}

</script>

</body>
</html>
