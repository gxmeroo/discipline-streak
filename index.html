<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Execution Streak</title>

<!-- Police moderne -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>

body{
    font-family: 'Inter', sans-serif;
    background:#000;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    color:#fff;
    margin:0;
}

.card{
    background:#111;
    padding:40px 30px;
    border-radius:20px;
    text-align:center;
    width:280px;
    border:1px solid #333;
    box-shadow:0 10px 30px rgba(255,255,255,0.05);
}

.title{
    font-size:24px;
    font-weight:800;
    margin-bottom:15px;
    letter-spacing:1px;
}

.streak{
    font-size:80px;
    font-weight:800;
    transition: transform 0.2s;
}

.label{
    color:#aaa;
    margin-bottom:25px;
    font-size:14px;
    text-transform: uppercase;
    letter-spacing:1px;
}

button{
    border:1px solid #555;
    padding:10px 22px;
    margin:5px;
    border-radius:12px;
    font-size:14px;
    cursor:pointer;
    background:#222;
    color:white;
    font-weight:600;
    transition: background 0.2s, transform 0.2s;
}

button:hover{
    background:#333;
    transform: translateY(-2px);
}

button:disabled{
    opacity:0.4;
    cursor:not-allowed;
    transform:none;
}

.message{
    margin-top:15px;
    font-size:13px;
    color:#ccc;
    min-height:16px;
}

</style>
</head>

<body>

<div class="card">

<div class="title">🔥 Execution Streak</div>

<div class="streak" id="counter">0</div>
<div class="label">days</div>

<button id="addBtn" onclick="add()">+1</button>
<button onclick="reset()">Reset</button>

<div class="message" id="message"></div>

</div>

<script>

let streak = parseInt(localStorage.getItem("streak")) || 0;
let lastDate = localStorage.getItem("lastDate");

let today = new Date().toDateString();

const counterEl = document.getElementById("counter");
const addBtn = document.getElementById("addBtn");
const messageEl = document.getElementById("message");

counterEl.innerText = streak;

if(lastDate === today){
    addBtn.disabled = true;
    messageEl.innerText = "✅ Déjà validé aujourd'hui. Reviens demain.";
}

function add(){
    if(lastDate === today) return;

    streak++;
    localStorage.setItem("streak", streak);
    localStorage.setItem("lastDate", today);

    counterEl.innerText = streak;
    counterEl.style.transform = "scale(1.3)";
    setTimeout(() => counterEl.style.transform = "scale(1)", 200);

    addBtn.disabled = true;
    messageEl.innerText = "🔥 Journée validée !";
}

function reset(){
    streak = 0;
    localStorage.setItem("streak", streak);
    localStorage.removeItem("lastDate");

    counterEl.innerText = streak;
    addBtn.disabled = false;
    messageEl.innerText = "";
}

</script>

</body>
</html>
